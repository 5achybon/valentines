<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SARAAHHH!!!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    /* ---------------- PARTICLES ---------------- */

    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      animation: float linear forwards;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      50% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
      }
    }

    /* ---------------- LAYERS ---------------- */

    #envelope-container,
    #letter-container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #letter-container {
      display: none;
    }

    #envelope {
      width: 200px;
      cursor: pointer;
      transition: transform 0.3s;
    }

    #envelope:hover {
      transform: scale(1.1);
    }

    /* ---------------- LETTER ---------------- */

    .buttons {
      margin-top: 20px;
    }

    .btn {
      width: 120px;
      cursor: pointer;
      margin: 10px;
      transition: transform 0.3s ease;
    }

    .final-text {
      margin-top: 20px;
      font-size: 24px;
      display: none;
    }
  </style>
</head>

<body>

  <div id="particles"></div>

  <!-- Envelope Screen -->
  <div id="envelope-container">
    <img src="envelope.png" alt="Envelope" id="envelope" />
    <h1>This for you bbg</h1>
  </div>

  <!-- Letter Screen -->
  <div id="letter-container">
    <div class="letter-window">
      <h1>question</h1>

      <img src="cat_heart.gif" width="200" />

      <div class="buttons">
        <img src="yes.png" class="btn yes-btn" alt="Yes" />
        <img src="no.png" class="btn no-btn" alt="No" />
      </div>

      <p id="final-text" class="final-text">
        <strong>yes :</strong> okay
      </p>
    </div>
  </div>

  <script>
    /* ---------------- PARTICLES ---------------- */

    const particlesContainer = document.getElementById("particles");

    function createParticle() {
      const particle = document.createElement("div");
      particle.classList.add("particle");

      const size = Math.random() * 6 + 4;
      particle.style.width = size + "px";
      particle.style.height = size + "px";

      particle.style.left = Math.random() * 100 + "vw";
      particle.style.animationDuration = Math.random() * 5 + 5 + "s";

      particlesContainer.appendChild(particle);

      setTimeout(() => {
        particle.remove();
      }, 10000);
    }

    setInterval(createParticle, 300);

    /* ---------------- PAGE LOGIC ---------------- */

    const envelope = document.getElementById("envelope");
    const envelopeContainer = document.getElementById("envelope-container");
    const letterContainer = document.getElementById("letter-container");
    const yesBtn = document.querySelector(".yes-btn");
    const finalText = document.getElementById("final-text");

    // Open letter when envelope clicked
    envelope.addEventListener("click", () => {
      envelopeContainer.style.display = "none";
      letterContainer.style.display = "flex";
    });

    // YES button grows when clicked
    yesBtn.addEventListener("click", () => {
      yesBtn.style.transform = "scale(1.5)";
      finalText.style.display = "block";
    });
  </script>

</body>
</html>
