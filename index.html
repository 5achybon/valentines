<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="valentines.css" />
    <title>Valentine Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Particle Background */
      #particles {
        position: fixed; /* changed from absolute */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        animation: float 10s infinite linear;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) scale(0);
          opacity: 0;
        }

        50% {
          opacity: 0.8;
        }

        100% {
          transform: translateY(-10vh) scale(1);
          opacity: 0;
        }
      }
    </style>

    <title>dude!!!</title>
  </head>

  <body>
    <div id="particles"></div>

    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      <h1 id="envelope-text">This for you bbg </h1>
    </div>

    <!-- Particle Script -->
    <script>
      const particlesContainer = document.getElementById("particles");

      function createParticle() {
        const particle = document.createElement("div");
        particle.classList.add("particle");

        const size = Math.random() * 6 + 4;
        particle.style.width = size + "px";
        particle.style.height = size + "px";

        particle.style.left = Math.random() * 100 + "vw";
        particle.style.animationDuration = Math.random() * 5 + 5 + "s";

        particlesContainer.appendChild(particle);

        setTimeout(() => {
          particle.remove();
        }, 10000);
      }

      setInterval(createParticle, 300);
    </script>
    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">aha Will you be my Valentine?(question rhétorique)</h1>

        <img src="cat_heart.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="yes.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="no.png" class="btn no-btn" alt="No" />
          </div>
        </div>

        <p id="final-text" class="final-text" style="display: none">
          <strong>It's A DATE then YAY :</strong> Pathé at 7pm shawty (https://discord.gg/2xuJNcsz)
        </p>
      </div>
    </div>
    <script src="valentines.js"></script>
  </body>
</html>
